name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Deploy to gh-pages branch
        run: |
          git config --global user.email "phucbuihuu2604@gmail.com"
          git config --global user.name "GitHub Actions"
          git fetch origin
          git checkout gh-pages || git checkout --orphan gh-pages
          rm -rf *
          cp -r build/web/* .
          git add .
          git commit -m "Deploy Flutter Web" || echo "No changes to commit"
          git push -f https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/maotou-spy/phucbh_resume.git gh-pages
